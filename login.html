<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fit-Daily — Ingresar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand:     #04BAF0;
      --brand-dark:#0390BC;
      --text:      #1A1A2E;
      --text-mid:  #4A4A6A;
      --text-muted:#8A8A9A;
      --bg:        #F2F2F2;
      --surface:   #FFFFFF;
      --border:    #E0E0E0;
      --error:     #E74C3C;
      --radius:    6px;
      --font-mono: 'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-wrap {
      width: 100%;
      max-width: 380px;
      padding: 20px;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-mark {
      width: 52px;
      height: 52px;
      background: var(--brand);
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 18px;
      color: white;
      margin-bottom: 14px;
      letter-spacing: -1px;
    }

    .brand-title {
      font-size: 22px;
      font-weight: 700;
      color: white;
      letter-spacing: -0.5px;
    }

    .brand-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .login-card {
      background: var(--surface);
      border-radius: 10px;
      padding: 28px;
    }

    .login-card h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-mid);
      margin-bottom: 6px;
    }

    .form-group select,
    .form-group input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 14px;
      color: var(--text);
      font-family: inherit;
      transition: border-color 0.15s;
    }

    .form-group select:focus,
    .form-group input:focus {
      outline: none;
      border-color: var(--brand);
    }

    .form-group input[type="password"] {
      font-family: var(--font-mono);
      letter-spacing: 2px;
    }

    .btn-login {
      width: 100%;
      background: var(--brand);
      color: white;
      border: none;
      padding: 11px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }

    .btn-login:hover { background: var(--brand-dark); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg {
      background: #FDEDEC;
      border: 1px solid #F5B7B1;
      color: var(--error);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    .error-msg.visible { display: block; }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-brand">
      <div class="brand-mark">SW</div>
      <div class="brand-title">Fit-Daily</div>
      <div class="brand-subtitle">Soft Warehouse SA — Uso interno</div>
    </div>

    <div class="login-card">
      <h2>Ingresar al sistema</h2>

      <form id="login-form" autocomplete="off">
        <div class="form-group">
          <label>Usuario Helpdesk</label>
          <input type="text" id="user-input" placeholder="Ej. JPHP001" required autofocus>
        </div>

        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="password-input" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-login" id="btn-login">Ingresar</button>
        <div class="error-msg" id="error-msg"></div>
      </form>
    </div>

    <div class="login-footer">Herramienta interna — no compartir credenciales</div>
  </div>

  <script src="js/firebase-config.js?v=26"></script>
  <script src="js/helpdesk-auth.js?v=26"></script>
  <script>
    const SESSION_KEY = 'fit-daily_session';

    // Si ya hay sesión válida con token → ir directo a la app
    const existing = localStorage.getItem(SESSION_KEY);
    if (existing) {
      try {
        const s = JSON.parse(existing);
        if (s?.token) window.location.href = 'index.html';
      } catch (_) {}
    }

    // Genera un color HSL estable a partir del user_id (para el avatar)
    function _colorFor(userId) {
      let hash = 0;
      for (let i = 0; i < userId.length; i++) {
        hash = userId.charCodeAt(i) + ((hash << 5) - hash);
      }
      const hue = Math.abs(hash) % 360;
      return `hsl(${hue}, 55%, 45%)`;
    }

    // Carga local del equipo para enriquecer perfil (color/rol del proyecto si existe)
    let teamLocal = [];
    fetch('data/users.json').then(r => r.json()).then(d => { teamLocal = d.users || []; }).catch(() => {});

    const errEl  = document.getElementById('error-msg');
    const btnEl  = document.getElementById('btn-login');
    const userEl = document.getElementById('user-input');
    const passEl = document.getElementById('password-input');

    function _showError(msg) {
      errEl.textContent = msg;
      errEl.classList.add('visible');
    }
    function _clearError() { errEl.classList.remove('visible'); }

    [userEl, passEl].forEach(el => el.addEventListener('input', _clearError));

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      _clearError();
      btnEl.disabled    = true;
      btnEl.textContent = 'Verificando...';

      const usuario = userEl.value.trim();
      const pass    = passEl.value;

      try {
        const { token, profile } = await HelpdeskAuth.login(usuario, pass);

        // Enriquecer con datos del equipo local si coincide
        const local = teamLocal.find(u => u.id === profile.user_id);

        localStorage.setItem(SESSION_KEY, JSON.stringify({
          id:      profile.user_id,
          name:    local?.name  || profile.person_name || profile.person_alias || profile.user_id,
          role:    local?.role  || profile.role_description || 'Usuario',
          apiRole: profile.role_description || '',  // rol autoritativo del Helpdesk para permisos
          color:   local?.color || _colorFor(profile.user_id),
          email:   profile.email || '',
          token,
        }));
        window.location.href = 'index.html';
      } catch (err) {
        const msg = err.message || String(err);
        if (/401|credenciales/i.test(msg)) _showError('Usuario o contraseña incorrectos.');
        else if (/409|active/i.test(msg))   _showError('Ya tienes una sesión activa. Espera unos segundos y vuelve a intentar.');
        else                                _showError('Error de conexión. Verifica tu red e intenta de nuevo.');
        btnEl.disabled    = false;
        btnEl.textContent = 'Ingresar';
        passEl.value      = '';
        passEl.focus();
      }
    });
  </script>
</body>
</html>
