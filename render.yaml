services:
  - type: web
    name: fit-daily-backend
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
        sync: false
      - key: MONGODB_URI
        value: ""
        sync: false
      - key: DATABASE_NAME
        value: ""
        sync: false
      - key: ALLOWED_ORIGINS
        value: ""
        sync: false
